on:
  pull_request:
    types: [labeled, unlabeled, synchronize]
jobs:
  run:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'create-vsix')
    steps:
      # Get a bot token so the bot's name shows up on all our actions
      - name: Get Token From roku-ci-token Application
        uses: tibdex/github-app-token@v1.5.1
        id: generate-token
        with:
          app_id: ${{ secrets.BOT_APP_ID }}
          private_key: ${{ secrets.BOT_PRIVATE_KEY }}
      - name: Set New GitHub Token
        run: echo "TOKEN=${{ steps.generate-token.outputs.token }}" >> $GITHUB_ENV
      #trigger the build on vscode-brightscript-language
      - name: Build vsix for branch "${{ github.head_ref}}"
        uses: the-actions-org/workflow-dispatch@v4
        id: create-vsix
        with:
          workflow: create-vsix
          ref: master
          wait-for-completion: true
          display-workflow-run-url: true
          repo: rokucommunity/vscode-brightscript-language
          token: ${{ env.TOKEN }}
          inputs: '{ "branch": "${{ github.head_ref }}"}'
      #add a comment on the PR
      - name: Add comment to PR with artifact download links
        uses: actions/github-script@v5
        with:
          github-token: ${{ env.TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const runId = ${{ steps.create-vsix.outputs.run-id }};
            const sha = '${{ github.event.pull_request.head.sha }}';
            const workflowUrl = '${{ steps.create-vsix.outputs.workflow-url }}';

            // Fetch artifacts from the triggered workflow run
            const artifactsResponse = await github.rest.actions.listWorkflowRunArtifacts({
              owner: 'rokucommunity',
              repo: 'vscode-brightscript-language',
              run_id: runId,
            });

            const artifacts = artifactsResponse.data.artifacts;
            const vsixArtifact = artifacts.find(a => a.name === 'vscode-brightscript-language.vsix');

            if (!vsixArtifact) {
              console.log('ERROR: Could not find vsix artifact');
              return;
            }

            // Construct direct download URL for the artifact
            const artifactDownloadUrl = `https://github.com/rokucommunity/vscode-brightscript-language/actions/runs/${runId}/attempts/1/artifacts/${vsixArtifact.id}`;

            let body = 'Hey there! I just built a new version of the vscode extension based on ' + sha + '.\n\n';
            body += 'You can download the .vsix files here:\n';
            body += '- **Production** (brightscript): [vscode-brightscript-language.vsix](' + artifactDownloadUrl + ')\n';
            body += '- **Temporary** (brightscript-temp): [vscode-brightscript-language.vsix](' + artifactDownloadUrl + ') ← same artifact, contains both\n\n';
            body += 'Install whichever one you need via VS Code (Extensions → ... → Install from VSIX). The temporary version has a different package ID so it won\'t conflict with the production version.\n\n';
            body += 'Then follow [these installation instructions](https://rokucommunity.github.io/vscode-brightscript-language/prerelease-versions.html) for full setup.\n\n';
            body += '[View full workflow run →](' + workflowUrl + ')';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: owner,
              repo: repo,
              body: body
            })
